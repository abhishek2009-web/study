<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Abhi Ai</title>
<style>
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0; height: 100%;
    background: #0a0a0c;
    font-family: -apple-system, "Segoe UI", Roboto, sans-serif;
    color: #ececec;
    overflow: hidden;
  }

  /* ---------- 3D intro ---------- */
  #intro {
    position: fixed; inset: 0;
    display: flex; align-items: center; justify-content: center;
    background: radial-gradient(ellipse at center, #14141a 0%, #08080a 70%);
    z-index: 999;
    perspective: 1000px;
    transition: opacity 0.8s ease, visibility 0.8s;
  }
  #intro.hide { opacity: 0; visibility: hidden; pointer-events: none; }

  .scene {
    transform-style: preserve-3d;
    animation: introSpin 2.6s ease forwards;
  }
  @keyframes introSpin {
    0%   { transform: rotateY(-90deg) scale(0.6); opacity: 0; }
    55%  { transform: rotateY(10deg) scale(1.05); opacity: 1; }
    75%  { transform: rotateY(-4deg) scale(1); }
    100% { transform: rotateY(0deg) scale(1); }
  }

  .title3d {
    position: relative;
    font-size: clamp(48px, 11vw, 120px);
    font-weight: 800;
    letter-spacing: 2px;
    color: #f5f5f5;
    transform-style: preserve-3d;
    animation: floatTitle 3.5s ease-in-out infinite;
  }
  .title3d span {
    display: inline-block;
    position: relative;
    background: linear-gradient(180deg, #ffffff 0%, #b9b9c6 55%, #6d6d7a 100%);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    text-shadow: none;
  }
  .title3d::before,
  .title3d::after {
    content: 'Abhi Ai';
    position: absolute; left: 0; top: 0;
    width: 100%;
    background: linear-gradient(180deg, transparent, transparent);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }
  /* layered depth using multiple text shadows */
  .title3d {
    text-shadow:
      0 1px 0 #cfcfcf,
      0 2px 0 #b8b8b8,
      0 3px 0 #a3a3a3,
      0 4px 0 #8e8e8e,
      0 5px 0 #7a7a7a,
      0 6px 0 #666666,
      0 7px 10px rgba(0,0,0,0.5),
      0 10px 25px rgba(120,110,255,0.25),
      0 15px 40px rgba(120,110,255,0.15);
  }
  @keyframes floatTitle {
    0%, 100% { transform: translateY(0) rotateX(6deg); }
    50%      { transform: translateY(-10px) rotateX(-2deg); }
  }
  .tagline {
    text-align: center;
    margin-top: 18px;
    font-size: 14px;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: #8f8fa3;
  }
  .loadbar {
    width: 180px; height: 2px; margin: 24px auto 0;
    background: #26262e; border-radius: 2px; overflow: hidden;
  }
  .loadbar > div {
    height: 100%; width: 0%;
    background: linear-gradient(90deg, #7a7aff, #b78aff);
    animation: load 2.4s ease forwards;
  }
  @keyframes load { to { width: 100%; } }

  /* ---------- app shell ---------- */
  #app {
    display: flex; flex-direction: column;
    height: 100%;
    max-width: 820px; margin: 0 auto;
    opacity: 0;
    transition: opacity 0.6s ease 0.2s;
  }
  #app.show { opacity: 1; }

  header {
    padding: 16px 20px;
    display: flex; align-items: center; gap: 10px;
    border-bottom: 1px solid #1c1c22;
    flex-shrink: 0;
  }
  header .logo {
    font-weight: 800; font-size: 20px;
    background: linear-gradient(180deg, #fff, #8f8fa3);
    -webkit-background-clip: text; background-clip: text; color: transparent;
  }
  header .status {
    margin-left: auto; font-size: 12px; color: #6d6d7a;
    display: flex; align-items: center; gap: 6px;
  }
  header .dot {
    width: 7px; height: 7px; border-radius: 50%; background: #4ade80;
    box-shadow: 0 0 8px #4ade80;
  }

  #messages {
    flex: 1; overflow-y: auto;
    padding: 24px 20px;
    display: flex; flex-direction: column; gap: 18px;
  }
  .msg { max-width: 78%; line-height: 1.55; font-size: 15px; white-space: pre-wrap; }
  .msg.user {
    align-self: flex-end;
    background: #2c2c58;
    padding: 10px 14px; border-radius: 14px 14px 3px 14px;
  }
  .msg.ai {
    align-self: flex-start;
    background: #17171d;
    border: 1px solid #232330;
    padding: 12px 16px; border-radius: 14px 14px 14px 3px;
  }
  .msg.ai.typing::after {
    content: '▍';
    animation: blink 1s step-start infinite;
    color: #7a7aff;
  }
  @keyframes blink { 50% { opacity: 0; } }

  #inputRow {
    flex-shrink: 0;
    padding: 14px 20px 20px;
    display: flex; gap: 10px;
    border-top: 1px solid #1c1c22;
  }
  #inputRow textarea {
    flex: 1; resize: none;
    background: #131318; color: #ececec;
    border: 1px solid #26262e; border-radius: 12px;
    padding: 12px 14px; font-size: 15px; font-family: inherit;
    max-height: 140px;
  }
  #inputRow textarea:focus { outline: none; border-color: #5a5aff; }
  #inputRow button {
    background: linear-gradient(180deg, #7a7aff, #5a5ae0);
    border: none; color: white; font-weight: 600;
    padding: 0 22px; border-radius: 12px; cursor: pointer;
    font-size: 14px;
  }
  #inputRow button:disabled { opacity: 0.5; cursor: default; }
  #inputRow button:hover:not(:disabled) { filter: brightness(1.08); }

  ::-webkit-scrollbar { width: 8px; }
  ::-webkit-scrollbar-thumb { background: #26262e; border-radius: 4px; }
</style>
</head>
<body>

<div id="intro">
  <div class="scene">
    <div class="title3d"><span>Abhi Ai</span></div>
    <div class="tagline">Your personal AI assistant</div>
    <div class="loadbar"><div></div></div>
  </div>
</div>

<div id="app">
  <header>
    <div class="logo">Abhi Ai</div>
    <div class="status"><span class="dot"></span>Online</div>
  </header>
  <div id="messages"></div>
  <div id="inputRow">
    <textarea id="input" rows="1" placeholder="Message Abhi Ai..."></textarea>
    <button id="sendBtn">Send</button>
  </div>
</div>

<script>
  setTimeout(() => {
    document.getElementById('intro').classList.add('hide');
    document.getElementById('app').classList.add('show');
  }, 2600);

  const messagesEl = document.getElementById('messages');
  const input = document.getElementById('input');
  const sendBtn = document.getElementById('sendBtn');
  let history = [];
  let busy = false;

  function addMsg(role, text) {
    const div = document.createElement('div');
    div.className = 'msg ' + (role === 'user' ? 'user' : 'ai');
    div.textContent = text;
    messagesEl.appendChild(div);
    messagesEl.scrollTop = messagesEl.scrollHeight;
    return div;
  }

  input.addEventListener('input', () => {
    input.style.height = 'auto';
    input.style.height = Math.min(input.scrollHeight, 140) + 'px';
  });

  input.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      send();
    }
  });
  sendBtn.addEventListener('click', send);

  async function send() {
    const text = input.value.trim();
    if (!text || busy) return;
    busy = true;
    sendBtn.disabled = true;
    input.value = '';
    input.style.height = 'auto';

    addMsg('user', text);
    history.push({ role: 'user', content: text });

    const aiDiv = addMsg('ai', 'Thinking...');
    aiDiv.classList.add('typing');

    try {
      const response = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          model: 'claude-sonnet-4-6',
          max_tokens: 1000,
          messages: history
        })
      });
      const data = await response.json();
      const reply = (data.content || [])
        .map(b => b.type === 'text' ? b.text : '')
        .join('\n')
        .trim() || 'Sorry, I could not generate a reply.';

      aiDiv.classList.remove('typing');
      aiDiv.textContent = reply;
      history.push({ role: 'assistant', content: reply });
    } catch (err) {
      aiDiv.classList.remove('typing');
      aiDiv.textContent = 'Something went wrong reaching Abhi Ai. Please try again.';
    } finally {
      busy = false;
      sendBtn.disabled = false;
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }
  }

  addMsg('ai', "Hi, I'm Abhi Ai. Ask me anything.");
</script>

</body>
</html>
